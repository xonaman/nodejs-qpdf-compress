name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ zlib1g-dev libjpeg-turbo8-dev

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install zlib libjpeg-turbo --triplet x64-windows-static
        env:
          VCPKG_ROOT: C:\vcpkg

      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint:check

      - name: Build QPDF and native addon
        run: |
          node scripts/download-qpdf.mjs
          npx node-gyp rebuild
          node scripts/bundle-lib.mjs
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:\vcpkg' || '' }}

      - run: npx tsc --noEmit
      - run: npm test
