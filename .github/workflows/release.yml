name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ zlib1g-dev libjpeg-turbo8-dev

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install zlib libjpeg-turbo --triplet x64-windows-static
        env:
          VCPKG_ROOT: C:\vcpkg

      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint:check

      - name: Test install script (source fallback)
        run: node scripts/install.mjs
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:\vcpkg' || '' }}

      - run: npm test

  prebuild:
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
            cross: true
          - os: windows-latest
            platform: win32
            arch: x64
          - os: windows-latest
            platform: win32
            arch: arm64
            cross: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ zlib1g-dev libjpeg-turbo8-dev

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install zlib libjpeg-turbo --triplet ${{ matrix.arch }}-windows-static
        env:
          VCPKG_ROOT: C:\vcpkg

      - run: npm ci --ignore-scripts

      - name: Build QPDF
        run: node scripts/download-qpdf.mjs
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:\vcpkg' || '' }}
          VCPKG_TARGET_TRIPLET: ${{ runner.os == 'Windows' && format('{0}-windows-static', matrix.arch) || '' }}

      - name: Build native addon
        run: npx node-gyp rebuild --arch=${{ matrix.arch }}

      - name: Bundle shared library
        run: node scripts/bundle-lib.mjs

      - name: Run tests
        if: ${{ !matrix.cross }}
        run: npm test

      - name: Create tarball
        shell: bash
        run: |
          tar czf "qpdf-compress-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" \
            build/Release/qpdf_compress.node

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: qpdf-compress-*.tar.gz

  prebuild-linux-cross:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            docker-platform: linux/arm64
            image: node:22-bookworm
          - arch: arm
            docker-platform: linux/arm/v7
            image: node:22-bookworm
          - arch: x64
            platform-suffix: musl
            docker-platform: linux/amd64
            image: node:22-alpine
          - arch: arm64
            platform-suffix: musl
            docker-platform: linux/arm64
            image: node:22-alpine
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.docker-platform }}

      - name: Build in Docker
        timeout-minutes: 60
        run: |
          docker run --rm --platform ${{ matrix.docker-platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ matrix.image }} \
            sh -c "
              if command -v apk > /dev/null; then
                apk add --no-cache cmake g++ make zlib-dev libjpeg-turbo-dev python3 linux-headers
              else
                apt-get update && apt-get install -y cmake g++ zlib1g-dev libjpeg-turbo8-dev python3 make
              fi &&
              npm ci --ignore-scripts &&
              node scripts/download-qpdf.mjs &&
              npx node-gyp rebuild &&
              node scripts/bundle-lib.mjs &&
              npm test
            "

      - name: Create tarball
        run: |
          suffix="${{ matrix.platform-suffix }}"
          if [ -n "$suffix" ]; then
            tar czf "qpdf-compress-${{ github.ref_name }}-linux-${suffix}-${{ matrix.arch }}.tar.gz" \
              -C build/Release qpdf_compress.node
          else
            tar czf "qpdf-compress-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz" \
              -C build/Release qpdf_compress.node
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: prebuild-linux-${{ matrix.platform-suffix && format('{0}-', matrix.platform-suffix) || '' }}${{ matrix.arch }}
          path: qpdf-compress-*.tar.gz

  release:
    needs: [prebuild, prebuild-linux-cross]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci --ignore-scripts

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: prebuild-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" artifacts/*.tar.gz --generate-notes
