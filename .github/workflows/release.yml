name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ zlib1g-dev libjpeg-turbo8-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake jpeg-turbo

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install zlib libjpeg-turbo --triplet x64-windows-static
        env:
          VCPKG_ROOT: C:\vcpkg

      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint:check
      - name: Build
        run: |
          node scripts/download-qpdf.mjs
          npx node-gyp rebuild
          node scripts/bundle-lib.mjs
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:\vcpkg' || '' }}
      - run: npm test

  prebuild:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: windows-latest
            platform: win32
            arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ zlib1g-dev libjpeg-turbo8-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake jpeg-turbo

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install zlib libjpeg-turbo --triplet ${{ matrix.arch }}-windows-static
        env:
          VCPKG_ROOT: C:\vcpkg

      - run: npm ci --ignore-scripts
      - name: Build
        run: |
          node scripts/download-qpdf.mjs
          npx node-gyp rebuild ${{ matrix.arch != 'arm64' && runner.os == 'macOS' && '--arch=x64' || '' }} ${{ matrix.arch == 'arm64' && runner.os == 'Windows' && '--arch=arm64' || '' }}
          node scripts/bundle-lib.mjs
        env:
          VCPKG_ROOT: ${{ runner.os == 'Windows' && 'C:\vcpkg' || '' }}
          VCPKG_TARGET_TRIPLET: ${{ runner.os == 'Windows' && format('{0}-windows-static', matrix.arch) || '' }}

      - name: Package prebuild (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARBALL="qpdf-compress-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL" -C build/Release qpdf_compress.node
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Package prebuild (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = node -p "require('./package.json').version"
          $TARBALL = "qpdf-compress-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          tar -czf $TARBALL -C build/Release qpdf_compress.node
          echo "TARBALL=$TARBALL" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v5
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.TARBALL }}

  prebuild-linux-cross:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            docker_platform: linux/arm64
            image: node:22-bookworm
          - arch: arm
            docker_platform: linux/arm/v7
            image: node:22-bookworm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.arch == 'arm' && 'arm' || matrix.arch }}
      - name: Build in ${{ matrix.arch }} container
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD:/work" -w /work \
            ${{ matrix.image }} bash -c "
              apt-get update && apt-get install -y cmake g++ zlib1g-dev libjpeg-turbo8-dev python3 make &&
              npm ci --ignore-scripts &&
              node scripts/download-qpdf.mjs &&
              npx node-gyp rebuild &&
              node scripts/bundle-lib.mjs
            "

      - name: Package prebuild
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARBALL="qpdf-compress-v${VERSION}-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL" -C build/Release qpdf_compress.node
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v5
        with:
          name: prebuild-linux-${{ matrix.arch }}
          path: ${{ env.TARBALL }}

  prebuild-linux-musl:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            docker_platform: linux/amd64
            image: node:22-alpine
          - arch: arm64
            docker_platform: linux/arm64
            image: node:22-alpine
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        if: matrix.arch != 'x64'
        with:
          platforms: ${{ matrix.arch }}
      - name: Build in Alpine ${{ matrix.arch }} container
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD:/work" -w /work \
            ${{ matrix.image }} sh -c "
              apk add --no-cache cmake g++ make zlib-dev libjpeg-turbo-dev python3 linux-headers &&
              npm ci --ignore-scripts &&
              node scripts/download-qpdf.mjs &&
              npx node-gyp rebuild &&
              node scripts/bundle-lib.mjs
            "

      - name: Package prebuild
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TARBALL="qpdf-compress-v${VERSION}-linux-musl-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL" -C build/Release qpdf_compress.node
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v5
        with:
          name: prebuild-linux-musl-${{ matrix.arch }}
          path: ${{ env.TARBALL }}

  release:
    needs: [prebuild, prebuild-linux-cross, prebuild-linux-musl]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v5
        with:
          path: prebuilds
          merge-multiple: true

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: prebuilds/*
          generate_release_notes: true
